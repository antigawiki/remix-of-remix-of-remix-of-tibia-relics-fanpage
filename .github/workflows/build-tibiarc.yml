name: Build tibiarc WASM Player

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.51

      - name: Install fmt library
        run: |
          cd /tmp
          git clone --depth 1 --branch 10.2.1 https://github.com/fmtlib/fmt.git
          cd fmt && mkdir build && cd build
          emcmake cmake .. -DFMT_DOC=OFF -DFMT_TEST=OFF -DFMT_INSTALL=ON -DCMAKE_INSTALL_PREFIX=/tmp/fmt-install
          emmake make -j$(nproc) && emmake make install

      - name: Clone tibiarc (fork with fixes)
        run: |
          git clone https://github.com/antigawiki/tibiarc.git /tmp/tibiarc

      - name: Copy web player source
        run: |
          cp tibiarc-player/web_player.cpp /tmp/tibiarc/web_player.cpp

      - name: Apply TibiaRelic protocol fixes (sed)
        run: |
          cd /tmp/tibiarc

          # =============================================
          # TIBIARELIC CUSTOM OPCODE FIXES
          # =============================================

          # 1. SpellCooldown (0xA4): tibiarc reads 5B (u8 + u32)
          #    TibiaRelic sends 2B (u8 + u8)
          sed -i '/void Parser::ParseSpellCooldown/,/^}/ s/reader\.SkipU32()/reader.SkipU8()/' lib/parser.cpp
          echo "Fixed 0xA4 SpellCooldown: 5B → 2B"

          # 2. PlayerTactics (0xA7): tibiarc reads 4B (4×u8)
          #    TibiaRelic sends 3B (no PvPMode)
          sed -i '/void Parser::ParsePlayerTactics/,/^}/ { /PvPMode/d }' lib/parser.cpp
          echo "Fixed 0xA7 PlayerTactics: 4B → 3B"

          # 3. CreatureSquare (0xA8): missing in tibiarc → crash
          #    TibiaRelic sends 5B (u32 creatureId + u8 color)
          sed -i '/case 0xAA:/i\    case 0xA8:\n        reader.Skip(5);\n        break;' lib/parser.cpp
          echo "Added 0xA8 CreatureSquare: 5B"

          # 4. WalkCancel (0xB6): tibiarc reads 2B (u16 via ParseMoveDelay)
          #    TibiaRelic sends 0B
          sed -i '/case 0xB6:/{n;s/.*ParseMoveDelay.*/        \/* TibiaRelic: WalkCancel 0 bytes *\//}' lib/parser.cpp
          echo "Fixed 0xB6 WalkCancel: 2B → 0B"

          # =============================================
          # NEW PATCHES — TibiaRelic protocol divergences
          # =============================================

          # 5. Talk (0xAA): TibiaRelic sends u32 statementGuid before sender name
          sed -i '/void Parser::ParseTalk/,/^}/{
            /DataReader &reader/a\    /* TibiaRelic: skip u32 statementGuid */ reader.SkipU32();
          }' lib/parser.cpp
          # Fallback if function sig is on same line as brace
          grep -q "statementGuid" lib/parser.cpp || \
            sed -i '/void Parser::ParseTalk/a\    /* TibiaRelic: skip u32 statementGuid */ reader.SkipU32();' lib/parser.cpp
          echo "Fixed 0xAA Talk: added SkipU32 for statementGuid"

          # 6. MapDescription (0x64): guard REMOVED — was skipping valid small updates
          echo "MapDesc guard skipped (removed to prevent black squares)"

          # 7. PlayerStats (0xA0): remove stamina (TibiaRelic sends 20B, not 22B)
          sed -i '/void Parser::ParsePlayerStats/,/^}/{ /[Ss]tamina/d; }' lib/parser.cpp
          echo "Fixed 0xA0 PlayerStats: removed stamina read"

          # 8-10. Missing opcodes: 0xA5, 0xA6, 0x63
          grep -q "case 0xA5" lib/parser.cpp || \
            sed -i '/case 0xA8:/i\    case 0xA5: reader.Skip(5); break; /* TibiaRelic: SpellGroupCooldown */' lib/parser.cpp
          echo "Added 0xA5 SpellGroupCooldown: 5B"

          grep -q "case 0xA6" lib/parser.cpp || \
            sed -i '/case 0xA8:/i\    case 0xA6: reader.Skip(4); break; /* TibiaRelic: MultiUseDelay */' lib/parser.cpp
          echo "Added 0xA6 MultiUseDelay: 4B"

          grep -q "case 0x63:" lib/parser.cpp || \
            sed -i '/case 0x64:/i\    case 0x63: reader.Skip(5); break; /* TibiaRelic: CreatureTurn */' lib/parser.cpp
          echo "Added 0x63 CreatureTurn: 5B"

          # 11. OutfitWindow (0xC8): u16 range → u8 (7.72 style)
          #     ONLY target RangeStart/RangeEnd — LookType must stay u16
          sed -i '/void Parser::ParseOutfitWindow/,/^}/{
            s/RangeStart = reader.ReadU16()/RangeStart = reader.ReadU8()/
            s/RangeEnd = reader.ReadU16()/RangeEnd = reader.ReadU8()/
          }' lib/parser.cpp
          echo "Fixed 0xC8 OutfitWindow: u16 range → u8 range (targeted)"

          # DAT PARSER: safe try-catch wrapper (no 0xFF scan)
          cp $GITHUB_WORKSPACE/tibiarc-player/dat_patch.py /tmp/tibiarc/dat_patch.py
          python3 /tmp/tibiarc/dat_patch.py lib/types.cpp
          echo "Applied safe DAT patch (try-catch with return)"

          # =============================================
          # VERIFICATION (non-fatal)
          # =============================================
          echo "=== Verifying patches ==="
          grep -n "statementGuid" lib/parser.cpp || echo "WARN: statementGuid not injected"
          grep -n "case 0xA5" lib/parser.cpp || echo "WARN: 0xA5 not found"
          grep -n "case 0xA5" lib/parser.cpp || echo "WARN: 0xA5 not found"
          grep -n "case 0xA6" lib/parser.cpp || echo "WARN: 0xA6 not found"
          grep -c "case 0x63" lib/parser.cpp || echo "WARN: 0x63 not found"
          echo "New patches verification complete"

          # =============================================
          # PROTOCOL FLAGS & SAFETY PATCHES
          # =============================================

          # 5. CreatureImpassable (0x92): remove assert that crashes on 7.72
          #    Only remove the assert — do NOT force PassableCreatures=true globally
          #    because TibiaRelic only sends 0x92 as a standalone opcode,
          #    it does NOT include passable bytes in creature known/unknown packets.
          sed -i 's/ParseAssert(Version_.Protocol.PassableCreatures);//' lib/parser.cpp
          echo "Fixed 0x92 CreatureImpassable: removed assert"

          # NOTE: OutfitAddons and PassableCreatures are intentionally LEFT as false
          # for 7.72. Forcing them true adds extra bytes to EVERY creature read,
          # causing immediate byte drift and black screen.

          # =============================================
          # Make Position_ public so web_player.cpp can save/restore it
          # =============================================
          sed -i 's/Position Position_;/public: Position Position_; private:/' lib/parser.hpp
          echo "Made Position_ public in parser.hpp"

          # FLOORDOWN (0xBF) patch REMOVED — was causing partial floor reads
          # STUCK-BUFFER detection REMOVED — was breaking valid tile loops
          echo "FloorDown and stuck-buffer patches skipped (removed to prevent corruption)"

          # =============================================
          # SCROLL 18x14: All 4 scroll directions → full map area
          # Global replacements (patterns are unique across the file)
          # =============================================
          sed -i 's/ParseMapDescription(reader, events, -8, -6, Map::TileBufferWidth, 1)/ParseMapDescription(reader, events, -8, -6, Map::TileBufferWidth, Map::TileBufferHeight)/' lib/parser.cpp
          echo "Patched ParseMoveNorth: full 18x14"

          sed -i 's/ParseMapDescription(reader, events, 9, -6, 1, Map::TileBufferHeight)/ParseMapDescription(reader, events, -8, -6, Map::TileBufferWidth, Map::TileBufferHeight)/' lib/parser.cpp
          echo "Patched ParseMoveEast: full 18x14"

          sed -i 's/ParseMapDescription(reader, events, -8, 7, Map::TileBufferWidth, 1)/ParseMapDescription(reader, events, -8, -6, Map::TileBufferWidth, Map::TileBufferHeight)/' lib/parser.cpp
          echo "Patched ParseMoveSouth: full 18x14"

          sed -i 's/ParseMapDescription(reader, events, -8, -6, 1, Map::TileBufferHeight)/ParseMapDescription(reader, events, -8, -6, Map::TileBufferWidth, Map::TileBufferHeight)/' lib/parser.cpp
          echo "Patched ParseMoveWest: full 18x14"

          # FLOORUP z==7 patch SKIPPED — sed too fragile for this structural change
          # TODO: implement via Python or direct C++ patch file

          # Verify scroll patches
          echo "=== Scroll verification ==="
          grep -c "TileBufferWidth, Map::TileBufferHeight" lib/parser.cpp

      - name: Build tibiarc library + web player
        run: |
          cd /tmp/tibiarc
          mkdir build && cd build
          
          emcmake cmake .. \
            -DTIBIARC_NO_LIBAV=ON \
            -DTIBIARC_NO_OPENMP=ON \
            -DTIBIARC_NO_TBB=ON \
            -DTIBIARC_NO_OPENSSL=ON \
            -DTIBIARC_NO_FMTLIB=OFF \
            -DTIBIARC_NO_ZLIB=ON \
            -DTIBIARC_NO_QT=ON \
            -DTIBIARC_NO_SDL2=ON \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH=/tmp/fmt-install \
            -DCMAKE_CXX_FLAGS="-fexceptions"
          
          emmake make -j$(nproc) tibiarc
          
          echo "Library built successfully"
          ls -la *.a || ls -la lib*.a || echo "Checking for library..."
          find . -name "*.a" -o -name "libtibiarc*"

      - name: Compile web player
        run: |
          cd /tmp/tibiarc/build
          
          em++ -O2 \
            -fexceptions \
            -s USE_SDL=2 \
            -s ALLOW_MEMORY_GROWTH=1 \
            -s EXPORTED_FUNCTIONS='["_main","_load_data_files","_load_recording","_load_recording_tibiarelic","_play","_pause_playback","_set_speed","_get_progress","_get_duration","_seek","_is_playing","_set_skip_messages","_malloc","_free"]' \
            -s EXPORTED_RUNTIME_METHODS='["ccall","cwrap","HEAPU8"]' \
            -s DISABLE_EXCEPTION_CATCHING=0 \
            -s ASYNCIFY=0 \
            -s TOTAL_MEMORY=536870912 \
            -s NO_EXIT_RUNTIME=1 \
            -s MODULARIZE=1 \
            -s EXPORT_NAME='TibiarcModule' \
            -I../lib \
            -I/tmp/fmt-install/include \
            -std=c++23 \
            ../web_player.cpp \
            libtibiarc.a \
            /tmp/fmt-install/lib/libfmt.a \
            -o tibiarc_player.js

      - name: Prepare output
        run: |
          mkdir -p public/tibiarc
          cp /tmp/tibiarc/build/tibiarc_player.js public/tibiarc/
          cp /tmp/tibiarc/build/tibiarc_player.wasm public/tibiarc/

      - name: Commit WASM files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/tibiarc/tibiarc_player.js public/tibiarc/tibiarc_player.wasm
          git commit -m "build: add compiled tibiarc WASM player" || echo "No changes to commit"
          git pull --rebase origin main
          git push
