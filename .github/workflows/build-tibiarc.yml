name: Build tibiarc WASM Player

on:
  workflow_dispatch:
  push:
    paths:
      - 'tibiarc-player/**'
      - '.github/workflows/build-tibiarc.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.51

      - name: Install fmt library
        run: |
          cd /tmp
          git clone --depth 1 --branch 10.2.1 https://github.com/fmtlib/fmt.git
          cd fmt && mkdir build && cd build
          emcmake cmake .. -DFMT_DOC=OFF -DFMT_TEST=OFF -DFMT_INSTALL=ON -DCMAKE_INSTALL_PREFIX=/tmp/fmt-install
          emmake make -j$(nproc) && emmake make install

      - name: Clone tibiarc (fork with fixes)
        run: |
          git clone https://github.com/antigawiki/tibiarc.git /tmp/tibiarc

      - name: Copy web player source
        run: |
          cp tibiarc-player/web_player.cpp /tmp/tibiarc/web_player.cpp

      - name: Apply TibiaRelic protocol fixes
        run: |
          cd /tmp/tibiarc

          # Protocol patches (parser.cpp) — robust Python-based patching
          python3 $GITHUB_WORKSPACE/tibiarc-player/protocol_patch.py lib/parser.cpp

          # FloorUp z=7 patch (parser.cpp) — read 6 surface floors
          # Note: fork already has this patch; script handles "already patched" gracefully
          python3 $GITHUB_WORKSPACE/tibiarc-player/floorup_patch.py lib/parser.cpp || echo "FloorUp patch skipped (likely already applied in fork)"

          # DAT parser resilience patch (types.cpp)
          python3 $GITHUB_WORKSPACE/tibiarc-player/dat_patch.py lib/types.cpp
          grep -c "Two-phase DAT parsing" lib/types.cpp && echo "DAT two-phase patch verified" || echo "WARN: DAT two-phase patch not applied"

          # Final verification — only check patches we actually apply
          echo "=== Final verification ==="
          grep -n "WalkCancel\|ParseMoveDelay" lib/parser.cpp | head -5 || echo "INFO: 0xB6 uses standard ParseMoveDelay"
          grep -n "case 0xA8" lib/parser.cpp || echo "WARN: 0xA8 CreatureSquare missing"
          grep -n "SkipU8.*TibiaRelic" lib/parser.cpp || echo "WARN: SpellCooldown patch missing"
          grep -n "SpellGroupCooldown" lib/parser.cpp || echo "WARN: 0xA5 SpellGroupCooldown missing"
          grep -n "case 0x63" lib/parser.cpp || echo "WARN: 0x63 CreatureTurn missing"
          grep -n "per-opcode recovery" lib/parser.cpp || echo "WARN: Parse loop recovery missing"
          grep -n "preserve events already parsed" lib/parser.cpp || echo "WARN: catch recovery block missing"
          grep -n "unknown opcode, stop but preserve" lib/parser.cpp || echo "WARN: default break patch missing"
          grep -c "DIAG.*opcode" lib/parser.cpp && echo "WARN: Diagnostic logging still present" || echo "Diagnostic logging removed OK"
          grep -n "PassableCreatures" lib/parser.cpp && echo "WARN: PassableCreatures assert still present" || echo "0x92 assert removed OK"
          echo "All patches verified"

      - name: Build tibiarc library + web player
        run: |
          cd /tmp/tibiarc
          mkdir build && cd build
          
          emcmake cmake .. \
            -DTIBIARC_NO_LIBAV=ON \
            -DTIBIARC_NO_OPENMP=ON \
            -DTIBIARC_NO_TBB=ON \
            -DTIBIARC_NO_OPENSSL=ON \
            -DTIBIARC_NO_FMTLIB=OFF \
            -DTIBIARC_NO_ZLIB=ON \
            -DTIBIARC_NO_QT=ON \
            -DTIBIARC_NO_SDL2=ON \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH=/tmp/fmt-install \
            -DCMAKE_CXX_FLAGS="-fexceptions"
          
          emmake make -j$(nproc) tibiarc
          
          echo "Library built successfully"
          ls -la *.a || ls -la lib*.a || echo "Checking for library..."
          find . -name "*.a" -o -name "libtibiarc*"

      - name: Compile web player
        run: |
          cd /tmp/tibiarc/build
          
          em++ -O2 \
            -fexceptions \
            -s USE_SDL=2 \
            -s ALLOW_MEMORY_GROWTH=1 \
            -s EXPORTED_FUNCTIONS='["_main","_load_data_files","_load_recording","_load_recording_tibiarelic","_play","_pause_playback","_set_speed","_get_progress","_get_duration","_seek","_is_playing","_set_skip_messages","_malloc","_free"]' \
            -s EXPORTED_RUNTIME_METHODS='["ccall","cwrap","HEAPU8"]' \
            -s DISABLE_EXCEPTION_CATCHING=0 \
            -s ASYNCIFY=0 \
            -s TOTAL_MEMORY=536870912 \
            -s NO_EXIT_RUNTIME=1 \
            -s MODULARIZE=1 \
            -s EXPORT_NAME='TibiarcModule' \
            -I../lib \
            -I/tmp/fmt-install/include \
            -std=c++23 \
            ../web_player.cpp \
            libtibiarc.a \
            /tmp/fmt-install/lib/libfmt.a \
            -o tibiarc_player.js

      - name: Prepare output
        run: |
          mkdir -p public/tibiarc
          cp /tmp/tibiarc/build/tibiarc_player.js public/tibiarc/
          cp /tmp/tibiarc/build/tibiarc_player.wasm public/tibiarc/

      - name: Commit WASM files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/tibiarc/tibiarc_player.js public/tibiarc/tibiarc_player.wasm
          git commit -m "build: add compiled tibiarc WASM player" || echo "No changes to commit"
          git pull --rebase origin main
          git push
