name: Build tibiarc WASM Player

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.51

      - name: Install fmt library
        run: |
          cd /tmp
          git clone --depth 1 --branch 10.2.1 https://github.com/fmtlib/fmt.git
          cd fmt && mkdir build && cd build
          emcmake cmake .. -DFMT_DOC=OFF -DFMT_TEST=OFF -DFMT_INSTALL=ON -DCMAKE_INSTALL_PREFIX=/tmp/fmt-install
          emmake make -j$(nproc) && emmake make install

      - name: Clone tibiarc (fork with fixes)
        run: |
          git clone https://github.com/antigawiki/tibiarc.git /tmp/tibiarc

      - name: Copy web player source
        run: |
          cp tibiarc-player/web_player.cpp /tmp/tibiarc/web_player.cpp

      - name: Apply TibiaRelic protocol fixes (sed)
        run: |
          cd /tmp/tibiarc

          # =============================================
          # TIBIARELIC CUSTOM OPCODE FIXES
          # =============================================

          # 1. SpellCooldown (0xA4): tibiarc reads 5B (u8 + u32)
          #    TibiaRelic sends 2B (u8 + u8)
          sed -i '/void Parser::ParseSpellCooldown/,/^}/ s/reader\.SkipU32()/reader.SkipU8()/' lib/parser.cpp
          echo "Fixed 0xA4 SpellCooldown: 5B → 2B"

          # 2. PlayerTactics (0xA7): tibiarc reads 4B (4×u8)
          #    TibiaRelic sends 3B (no PvPMode)
          sed -i '/void Parser::ParsePlayerTactics/,/^}/ { /PvPMode/d }' lib/parser.cpp
          echo "Fixed 0xA7 PlayerTactics: 4B → 3B"

          # 3. CreatureSquare (0xA8): missing in tibiarc → crash
          #    TibiaRelic sends 5B (u32 creatureId + u8 color)
          sed -i '/case 0xAA:/i\    case 0xA8:\n        reader.Skip(5);\n        break;' lib/parser.cpp
          echo "Added 0xA8 CreatureSquare: 5B"

          # 4. WalkCancel (0xB6): tibiarc reads 2B (u16 via ParseMoveDelay)
          #    TibiaRelic sends 0B
          sed -i '/case 0xB6:/{n;s/.*ParseMoveDelay.*/        \/* TibiaRelic: WalkCancel 0 bytes *\//}' lib/parser.cpp
          echo "Fixed 0xB6 WalkCancel: 2B → 0B"

          # =============================================
          # VERIFICATION
          # =============================================
          echo "=== Verifying patches ==="
          grep -n "case 0xA8" lib/parser.cpp
          grep -n "WalkCancel 0 bytes" lib/parser.cpp
          echo "All TibiaRelic protocol fixes applied successfully"

          # =============================================
          # PROTOCOL FLAGS & SAFETY PATCHES
          # =============================================

          # 5. CreatureImpassable (0x92): remove assert that crashes on 7.72
          #    Only remove the assert — do NOT force PassableCreatures=true globally
          #    because TibiaRelic only sends 0x92 as a standalone opcode,
          #    it does NOT include passable bytes in creature known/unknown packets.
          sed -i 's/ParseAssert(Version_.Protocol.PassableCreatures);//' lib/parser.cpp
          echo "Fixed 0x92 CreatureImpassable: removed assert"

          # NOTE: OutfitAddons and PassableCreatures are intentionally LEFT as false
          # for 7.72. Forcing them true adds extra bytes to EVERY creature read,
          # causing immediate byte drift and black screen.

          # =============================================
          # REVERT SCROLL PATCHES (fork has 18x14 baked in, must restore standard)
          # =============================================

          # 6. Scroll East (0x65): fork reads 18x14, standard is 1×14
          sed -i '/void Parser::ParseMoveEast/,/^}/ s|ParseMapDescription(reader, events, -8, -6, Map::TileBufferWidth, Map::TileBufferHeight)|ParseMapDescription(reader, events, +9, -6, 1, Map::TileBufferHeight)|' lib/parser.cpp
          echo "Reverted 0x65 ScrollEast: 18x14 → 1×14"

          # 7. Scroll North (0x66): fork reads 18x14, standard is 18×1
          sed -i '/void Parser::ParseMoveNorth/,/^}/ s|ParseMapDescription(reader, events, -8, -6, Map::TileBufferWidth, Map::TileBufferHeight)|ParseMapDescription(reader, events, -8, -6, Map::TileBufferWidth, 1)|' lib/parser.cpp
          echo "Reverted 0x66 ScrollNorth: 18x14 → 18×1"

          # 8. Scroll South (0x67): fork reads 18x14, standard is 18×1
          sed -i '/void Parser::ParseMoveSouth/,/^}/ s|ParseMapDescription(reader, events, -8, -6, Map::TileBufferWidth, Map::TileBufferHeight)|ParseMapDescription(reader, events, -8, +7, Map::TileBufferWidth, 1)|' lib/parser.cpp
          echo "Reverted 0x67 ScrollSouth: 18x14 → 18×1"

          # 9. Scroll West (0x68): fork reads 18x14, standard is 1×14
          sed -i '/void Parser::ParseMoveWest/,/^}/ s|ParseMapDescription(reader, events, -8, -6, Map::TileBufferWidth, Map::TileBufferHeight)|ParseMapDescription(reader, events, -8, -6, 1, Map::TileBufferHeight)|' lib/parser.cpp
          echo "Reverted 0x68 ScrollWest: 18x14 → 1×14"

          # 10. FloorUp (0xBE z==7): fork reads only 1 floor, standard reads 6 (5→0)
          #     Use sed to remove the single-floor comment+call and insert the loop
          sed -i '/TibiaRelic: only the newly visible floor/,/tileSkip);/{
            /TibiaRelic: only the newly visible floor/{
              s|.*|        for (int zIdx = 5; zIdx >= 0; zIdx--) {\n            tileSkip = ParseFloorDescription(reader,\n                                             events,\n                                             Position_.X - 8,\n                                             Position_.Y - 6,\n                                             zIdx,\n                                             Map::TileBufferWidth,\n                                             Map::TileBufferHeight,\n                                             Map::TileBufferDepth - zIdx,\n                                             tileSkip);\n        }|
            }
            /TibiaRelic: only the newly visible floor/!d
          }' lib/parser.cpp
          echo "Reverted FloorUp z==7: 1 floor → 6 floors (5→0)"

          # =============================================
          # DIAGNOSTIC LOGGING (remove after debugging)
          # =============================================
          sed -i 's/switch (reader.ReadU8()) {/auto _op = reader.ReadU8(); printf("[DIAG] opcode=0x%02X rem=%zu\\n", _op, reader.Remaining()); switch (_op) {/' lib/parser.cpp
          echo "Added diagnostic opcode logging"

          # =============================================
          # VERIFICATION
          # =============================================
          echo "=== Verifying scroll reverts ==="
          grep -n "ParseMoveEast" lib/parser.cpp
          grep -n "ParseMoveNorth" lib/parser.cpp
          grep -n "ParseMoveSouth" lib/parser.cpp
          grep -n "ParseMoveWest" lib/parser.cpp
          grep -A5 "Position_.Z == 7" lib/parser.cpp | head -10
          echo "All patches verified"

      - name: Build tibiarc library + web player
        run: |
          cd /tmp/tibiarc
          mkdir build && cd build
          
          emcmake cmake .. \
            -DTIBIARC_NO_LIBAV=ON \
            -DTIBIARC_NO_OPENMP=ON \
            -DTIBIARC_NO_TBB=ON \
            -DTIBIARC_NO_OPENSSL=ON \
            -DTIBIARC_NO_FMTLIB=OFF \
            -DTIBIARC_NO_ZLIB=ON \
            -DTIBIARC_NO_QT=ON \
            -DTIBIARC_NO_SDL2=ON \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH=/tmp/fmt-install \
            -DCMAKE_CXX_FLAGS="-fexceptions"
          
          emmake make -j$(nproc) tibiarc
          
          echo "Library built successfully"
          ls -la *.a || ls -la lib*.a || echo "Checking for library..."
          find . -name "*.a" -o -name "libtibiarc*"

      - name: Compile web player
        run: |
          cd /tmp/tibiarc/build
          
          em++ -O2 \
            -fexceptions \
            -s USE_SDL=2 \
            -s ALLOW_MEMORY_GROWTH=1 \
            -s EXPORTED_FUNCTIONS='["_main","_load_data_files","_load_recording","_load_recording_tibiarelic","_play","_pause_playback","_set_speed","_get_progress","_get_duration","_seek","_is_playing","_set_skip_messages","_malloc","_free"]' \
            -s EXPORTED_RUNTIME_METHODS='["ccall","cwrap","HEAPU8"]' \
            -s DISABLE_EXCEPTION_CATCHING=0 \
            -s ASYNCIFY=0 \
            -s TOTAL_MEMORY=536870912 \
            -s NO_EXIT_RUNTIME=1 \
            -s MODULARIZE=1 \
            -s EXPORT_NAME='TibiarcModule' \
            -I../lib \
            -I/tmp/fmt-install/include \
            -std=c++23 \
            ../web_player.cpp \
            libtibiarc.a \
            /tmp/fmt-install/lib/libfmt.a \
            -o tibiarc_player.js

      - name: Prepare output
        run: |
          mkdir -p public/tibiarc
          cp /tmp/tibiarc/build/tibiarc_player.js public/tibiarc/
          cp /tmp/tibiarc/build/tibiarc_player.wasm public/tibiarc/

      - name: Commit WASM files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/tibiarc/tibiarc_player.js public/tibiarc/tibiarc_player.wasm
          git commit -m "build: add compiled tibiarc WASM player" || echo "No changes to commit"
          git pull --rebase origin main
          git push
